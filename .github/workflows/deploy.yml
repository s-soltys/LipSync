# Deploy LipSync to GitHub Pages
#
# Builds the Vite project and deploys the static dist/ output to
# GitHub Pages on every push to master.
#
# The site will be available at:
#   https://s-soltys.github.io/LipSync/
#
# To use a custom domain, add a CNAME file to public/ or configure
# it in the Pages settings (Settings → Pages → Custom domain).

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time — cancel in-progress runs for the same branch
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # --base sets the path for assets to match the GitHub Pages URL
        run: npm run build -- --base=/LipSync/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
